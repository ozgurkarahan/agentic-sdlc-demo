# EXAMPLE workflow — copy to a target repo's `.github/workflows/tests-and-evals.yml`.
# It lives under docs/.../harness/workflows/ on purpose, so GitHub does NOT run it in THIS repo.
# Verification = Tests (deterministic) + Evals (a LAYERED PATTERN run as Actions jobs, not a GitHub product).
# Make both jobs REQUIRED status checks in the target repo's ruleset/branch protection to actually gate merges.
name: Tests & Evals (EXAMPLE)

on:
  pull_request:
    branches: [ main ]

concurrency:
  group: tests-evals-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests:
    name: Tests (${{ matrix.suite }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [unit, e2e]
    steps:
      - uses: actions/checkout@v4
      - name: Run ${{ matrix.suite }} tests
        run: echo "Replace with your ${{ matrix.suite }} test command (e.g. npm test / pytest)"

  evals:
    name: Evals (trajectory + rubric)   # LAYERED PATTERN — not a native GitHub product
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trajectory eval
        run: |
          echo "Replace: did the agent take the right steps / call the right tools?"
      - name: Output rubric / LM-judge
        run: |
          echo "Replace: score output quality against a rubric or an LM-judge"
      - name: Eval regression suite
        run: |
          echo "Replace: re-run the eval regression set; fail on score drop"
