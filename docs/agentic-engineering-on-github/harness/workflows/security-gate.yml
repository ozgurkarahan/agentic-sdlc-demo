# EXAMPLE workflow — copy to a target repo's `.github/workflows/security-gate.yml`.
# It lives under docs/.../harness/workflows/ on purpose, so GitHub does NOT run it in THIS repo.
# These are NATIVE GitHub capabilities (GHAS). Make them REQUIRED status checks to gate merges.
name: Security Gate (EXAMPLE)

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency review (supply-chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  codeql:
    name: CodeQL (code scanning)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [ "javascript-typescript" ]   # set to your repo's CodeQL language(s)
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  supply-chain-check:
    name: Hallucinated-dependency / slopsquatting check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify dependencies are real, maintained, and pinned
        run: |
          echo "Replace: assert every dependency resolves to a real, maintained, pinned package"
